<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HEIDEGGER • Normalizador de Relatórios</title>

    <meta name="description" content="Normalizador de Relatórios">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link href="style.css" rel="stylesheet">

</head>

<body>

<div class="container-fluid vh-100">

    <div class="row h-100">

        <!-- ========================================================= -->
        <!-- PAINEL ESQUERDO                                           -->
        <!-- ========================================================= -->

        <div class="col-lg-7 left-panel">

            <div class="content">

                <!-- Cabeçalho -->

                <div class="brand">

                    <i class="bi bi-box"></i>

                    <div>

                        <h1>HEIDEGGER</h1>

                        <span>Normalizador de Relatórios</span>

                    </div>

                </div>

                <!-- Frase -->

                <blockquote>

                    “A linguagem é a casa do Ser.”

                    <footer>

                        — Martin Heidegger

                    </footer>

                </blockquote>

                <!-- Área Drag and Drop -->

                <div id="dropZone">

                    <input
                            type="file"
                            id="fileInput"
                            accept=".gz,.csv.gz"
                            multiple
                            hidden>

                    <div class="drop-icon">

                        <i class="bi bi-cloud-arrow-up-fill"></i>

                    </div>

                    <h3>Arraste um ou mais arquivos</h3>

                    <p>

                        Solte aqui os arquivos <strong>.csv.gz</strong>

                        <br>

                        ou clique para selecionar.

                    </p>

                </div>

                <!-- Status -->

                <div class="status-card">

                    <div class="status-title">

                        <i class="bi bi-cpu"></i>

                        Status

                    </div>

                    <div id="statusMessage">
					
					<div class="progress mt-3">

    <div
        id="progressBar"
        class="progress-bar progress-bar-striped progress-bar-animated"
        style="width:0%">
    </div>

</div>

                        Aguardando arquivo...

                    </div>

                </div>

                <!-- Histórico -->

                <div class="history-card">

                    <div class="history-title">

                        <i class="bi bi-clock-history"></i>

                        Histórico da Sessão

                    </div>

                    <div id="history">

                        <div class="history-empty">

                            Nenhum relatório processado.

                        </div>

                    </div>

                </div>

                <!-- Rodapé -->

				<footer class="footer">

					<div>

						<i class="bi bi-shield-lock"></i>

						Processamento 100% local

						&nbsp;•&nbsp;

						<a
							href="https://github.com/baciotti/trabalho"
							target="_blank"
							rel="noopener noreferrer">

							<i class="bi bi-github"></i>

							GitHub

						</a>

					</div>

					<div>

						v1.0.0

					</div>

				</footer>
            </div>

        </div>

        <!-- ========================================================= -->
        <!-- FOTO -->
        <!-- ========================================================= -->

        <div class="col-lg-5 image-panel">

            <img
                    src="img/heidegger.jpg"
                    alt="Martin Heidegger">

            <div class="image-overlay"></div>

        </div>

    </div>

</div>

<!-- ============================================================= -->
<!-- Bibliotecas -->
<!-- ============================================================= -->

<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.min.js"></script>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<!-- ============================================================= -->
<!-- Aplicação -->
<!-- ============================================================= -->

<script src="app.js"></script>

</body>

</html>
